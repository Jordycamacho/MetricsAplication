spring.application.name=backend

# ── Perfil activo ──────────────────────────────────────────────────────────────
# En local se activa con: -Dspring.profiles.active=dev  (o en tu IDE)
# En producción se activa con la variable de entorno: SPRING_PROFILES_ACTIVE=prod
# Si no se define nada, Spring solo usa este archivo base

# ── JPA (común a todos los entornos) ──────────────────────────────────────────
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── OpenAPI / Swagger ──────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ── MapStruct ─────────────────────────────────────────────────────────────────
mapstruct.defaultComponentModel=spring

# ── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.property-naming-strategy=com.fasterxml.jackson.databind.PropertyNamingStrategies$LowerCaseStrategy
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.deserialization.fail-on-null-for-primitives=false

# ── Actuator ──────────────────────────────────────────────────────────────────
# Los endpoints específicos se controlan por perfil
management.endpoint.health.show-details=always