<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Restablece tu contraseña</title>
</head>
<body style="margin:0;padding:0;background:#0A0A0A;font-family:Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#0A0A0A;padding:32px 16px;">
    <tr>
        <td align="center">
            <table width="100%" style="max-width:520px;background:#131313;border-radius:16px;padding:32px;">
                <tr>
                    <td style="text-align:center;padding-bottom:24px;">
                        <span style="color:#C8B560;font-size:24px;font-weight:bold;letter-spacing:4px;">JNOBFIT</span>
                    </td>
                </tr>
                <tr>
                    <td style="color:#FFFFFF;font-size:18px;font-weight:bold;padding-bottom:12px;">
                        Restablece tu contraseña
                    </td>
                </tr>
                <tr>
                    <td style="color:#AAAAAA;font-size:14px;line-height:1.6;padding-bottom:24px;">
                        Hola <span th:text="${fullName}">usuario</span>, recibimos una solicitud para restablecer tu contraseña.
                        El enlace expira en <span th:text="${expiryHours}">1</span> hora.
                    </td>
                </tr>
                <tr>
                    <td align="center" style="padding-bottom:24px;">
                        <a th:href="${resetUrl}"
                           style="display:inline-block;background:#C8B560;color:#0A0A0A;text-decoration:none;padding:14px 32px;border-radius:12px;font-weight:bold;font-size:14px;">
                            Restablecer contraseña
                        </a>
                    </td>
                </tr>
                <tr>
                    <td style="color:#555555;font-size:12px;line-height:1.5;">
                        Si no solicitaste este cambio, ignora este mensaje. Tu contraseña no cambiará.
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
