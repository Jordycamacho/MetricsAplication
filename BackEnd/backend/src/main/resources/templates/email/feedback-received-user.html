<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Feedback recibido</title>
</head>
<body style="margin:0;padding:0;background:#0A0A0A;font-family:Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#0A0A0A;padding:32px 16px;">
    <tr>
        <td align="center">
            <table width="100%" style="max-width:520px;background:#131313;border-radius:16px;padding:32px;">
                <tr>
                    <td style="text-align:center;padding-bottom:24px;">
                        <span style="color:#C8B560;font-size:24px;font-weight:bold;letter-spacing:4px;">JNOBFIT</span>
                    </td>
                </tr>
                <tr>
                    <td style="color:#FFFFFF;font-size:18px;font-weight:bold;padding-bottom:12px;">
                        ¡Gracias<span th:if="${fullName != null and !fullName.isEmpty()}" th:text="' ' + ${fullName}">!</span>!
                    </td>
                </tr>
                <tr>
                    <td style="color:#AAAAAA;font-size:14px;line-height:1.6;padding-bottom:16px;">
                        Hemos recibido tu <span th:text="${feedbackTypeLabel}">reporte</span> correctamente.
                        Referencia: <strong style="color:#C8B560;">#<span th:text="${feedbackId}">0</span></strong>.
                    </td>
                </tr>
                <tr>
                    <td style="color:#AAAAAA;font-size:14px;line-height:1.6;padding-bottom:24px;">
                        En esta etapa beta revisamos todos los envíos. Tu aporte nos ayuda a mejorar la app.
                        No podemos responder a cada mensaje de forma individual, pero sí leemos cada uno.
                    </td>
                </tr>
                <tr>
                    <td style="color:#555555;font-size:12px;">
                        Entrena. Progresa. Domina.
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
