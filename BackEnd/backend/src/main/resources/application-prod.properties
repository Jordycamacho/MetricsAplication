# ══════════════════════════════════════════════════════════════════════════════
# PERFIL PRODUCCIÓN - SPRING_PROFILES_ACTIVE=prod
# ══════════════════════════════════════════════════════════════════════════════

# ── Servidor ──────────────────────────────────────────────────────────────────
server.port=8080

# ── Base de datos ─────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.session.store-type=none

# ── JPA -  validate nunca modifica el schema, Flyway lo gestiona ──────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.connect-timeout=2000
spring.data.redis.timeout=1000
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.client-type=lettuce
spring.data.redis.lettuce.shutdown-timeout=200ms

# ── Cache ─────────────────────────────────────────────────────────────────────
spring.cache.type=caffeine
spring.cache.cache-names=users,products
spring.cache.caffeine.spec=maximumSize=500,expireAfterAccess=600s

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.private-key-location=classpath:certs/private_key.pem
jwt.public-key-location=classpath:certs/public_key.pem

# ── OAuth2 Google ─────────────────────────────────────────────────────────────
google.client-id=${GOOGLE_CLIENT_ID}
google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${APP_BASE_URL}/login/oauth2/code/google
app.oauth2.redirect-uri=fitapp://auth/callback
google.redirect-uri=https://api.jnobfit.online/login/oauth2/code/google

# ── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.allowed-headers=Authorization,Content-Type,X-Requested-With
cors.exposed-headers=X-Auth-Token,Authorization
cors.allow-credentials=true

# ── Mail ──────────────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_USERNAME}
app.frontend.url=${APP_BASE_URL}

# ── OpenAPI - DESACTIVADO en producción ───────────────────────────────────────
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
app.openapi.dev-url=${APP_BASE_URL}

# ── Actuator - solo health y prometheus en prod ───────────────────────────────
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=when-authorized

# ── Logs - solo INFO en prod, sin ruido innecesario ───────────────────────────
logging.level.root=WARN
logging.level.com.fitapp.backend=INFO

# ── Errores - no exponer detalles internos al cliente ─────────────────────────
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never